# This is a Databricks asset bundle definition for retail_lakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: retail_lakehouse
  uuid: 8b451359-a800-446c-b9cc-4bb177290c5e

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-9aaaed53-ab17.cloud.databricks.com
    variables:
      catalog: retail_lakehouse
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-9aaaed53-ab17.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/shrividyahegde222@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/shrividyahegde222@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: retail_lakehouse
      schema: prod
    permissions:
      - user_name: shrividyahegde222@gmail.com
        level: CAN_MANAGE