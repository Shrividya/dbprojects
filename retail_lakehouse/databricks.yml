bundle:
  name: retail_lakehouse
  uuid: 8b451359-a800-446c-b9cc-4bb177290c5e

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  workspace_host:
    description: The Databricks workspace host URL (set via BUNDLE_VAR_WORKSPACE_HOST env var or --var flag)

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: retail_lakehouse
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: ${var.workspace_host}
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: retail_lakehouse
      schema: prod
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
